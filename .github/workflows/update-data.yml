name: Update Meta Ads Dashboard Data

on:
  schedule:
    # 23:00 UTC = 06:00 sáng giờ Việt Nam (UTC+7) hôm sau — chỉnh lại nếu muốn giờ khác
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Meta Ads data
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          AD_ACCOUNT_ID: ${{ secrets.AD_ACCOUNT_ID }}
          CAMPAIGN_ID: ${{ vars.CAMPAIGN_ID }}
        run: python scripts/fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update ads data $(date -u +%F)"
            git push
          else
            echo "Không có thay đổi dữ liệu."
          fi
